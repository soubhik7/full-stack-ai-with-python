name: Custom Gmail AI Assistant

on:
  schedule:
    - cron: "0 */3 * * *"   # Every 3 hours
  workflow_dispatch:        # Allow manual trigger

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Gmail Summarizer
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          # The custom model needs to be present in the repo or trained during the action.
          # Since it's trained from scratch and relatively small, we assume it's committed to the repo (model.pth).
          # If not, the user can run train.py first.
          python app.py
